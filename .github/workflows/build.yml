name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build + stage on VPS
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    outputs:
      release_id: ${{ steps.release.outputs.id }}
    env:
      WEB_HOST: ${{ secrets.WEB_HOST }}
      WORKER_HOST: ${{ secrets.WORKER_HOST }}
      DEPLOY_USER: root
      APP_USER: remarka
      APP_HOME: /srv/remarka
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck (web)
        run: npx tsc --noEmit -p apps/web/tsconfig.json

      - name: Typecheck (worker)
        run: npm --prefix apps/worker run typecheck

      - name: Unit tests (web)
        run: npm run test:unit

      - name: Build web (Next.js)
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_ENV: production
        run: npm run web:build

      - name: Build worker (if a build script exists)
        run: |
          if node -e "process.exit(require('./apps/worker/package.json').scripts.build ? 0 : 1)"; then
            npm --prefix apps/worker run build
          else
            echo "No worker build script — skipping (worker uses tsx at runtime)."
          fi

      - name: Compute release id
        id: release
        run: echo "id=$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Stage release bundle locally
        run: |
          set -euo pipefail
          mkdir -p _bundle
          # Copy everything except dev/build cruft. node_modules is reinstalled
          # on each host (smaller transfer + platform-correct binaries).
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.next/cache' \
            --exclude='evals' \
            --exclude='_bundle' \
            --exclude='.pgdata-local' \
            --exclude='tmp-*' \
            --exclude='*.log' \
            ./ _bundle/

      # Keep a GH artifact too — handy for debugging without VPS access, and
      # makes the build reproducible if we ever need to rebuild manually.
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v5
        with:
          name: remarka-bundle-${{ steps.release.outputs.id }}
          path: _bundle
          retention-days: 7
          if-no-files-found: error
          # CRITICAL: by default upload-artifact ignores hidden files (.next/,
          # .env*, etc.). Without this flag standalone build is silently lost.
          include-hidden-files: true

      - name: Configure SSH (web + worker via ProxyJump)
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$WEB_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          cat >>~/.ssh/config <<EOF
          Host web
            HostName $WEB_HOST
            User $DEPLOY_USER
            IdentityFile ~/.ssh/id_deploy
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
          Host worker
            HostName $WORKER_HOST
            User $DEPLOY_USER
            IdentityFile ~/.ssh/id_deploy
            ProxyJump $DEPLOY_USER@$WEB_HOST
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF

      - name: Stage bundle on web VPS + npm ci
        run: |
          set -euo pipefail
          RELEASE_ID=${{ steps.release.outputs.id }}
          ssh web "install -d -o $APP_USER -g $APP_USER -m 755 $APP_HOME/releases/$RELEASE_ID"
          rsync -az --delete _bundle/ "web:$APP_HOME/releases/$RELEASE_ID/"
          ssh web bash -s <<EOF
          set -euo pipefail
          RELEASE_DIR=$APP_HOME/releases/$RELEASE_ID
          chown -R $APP_USER:$APP_USER "\$RELEASE_DIR"
          sudo -u $APP_USER bash -lc "cd \$RELEASE_DIR && npm ci --omit=dev --no-audit --no-fund"
          sudo -u $APP_USER bash -lc "cd \$RELEASE_DIR && npm run db:generate"
          # Prune all but the 5 newest releases. Migrate/deploy choose the
          # latest by default, so we keep a few for rollback flexibility.
          cd $APP_HOME/releases
          ls -1t | tail -n +6 | xargs -r rm -rf
          EOF

      - name: Stage bundle on worker VPS + npm ci
        run: |
          set -euo pipefail
          RELEASE_ID=${{ steps.release.outputs.id }}
          ssh worker "install -d -o $APP_USER -g $APP_USER -m 755 $APP_HOME/releases/$RELEASE_ID"
          rsync -az --delete -e "ssh" _bundle/ "worker:$APP_HOME/releases/$RELEASE_ID/"
          ssh worker bash -s <<EOF
          set -euo pipefail
          RELEASE_DIR=$APP_HOME/releases/$RELEASE_ID
          chown -R $APP_USER:$APP_USER "\$RELEASE_DIR"
          sudo -u $APP_USER bash -lc "cd \$RELEASE_DIR && npm ci --omit=dev --no-audit --no-fund"
          sudo -u $APP_USER bash -lc "cd \$RELEASE_DIR && npm run db:generate"
          cd $APP_HOME/releases
          ls -1t | tail -n +6 | xargs -r rm -rf
          EOF

      - name: Summary
        run: |
          echo "## Build complete" >> $GITHUB_STEP_SUMMARY
          echo "**Release ID**: \`${{ steps.release.outputs.id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Bundle staged on:" >> $GITHUB_STEP_SUMMARY
          echo "- web: \`$APP_HOME/releases/${{ steps.release.outputs.id }}/\`" >> $GITHUB_STEP_SUMMARY
          echo "- worker: \`$APP_HOME/releases/${{ steps.release.outputs.id }}/\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Next steps (manual buttons in Actions):" >> $GITHUB_STEP_SUMMARY
          echo "1. Run **Migrate** workflow if this build contains DB migrations" >> $GITHUB_STEP_SUMMARY
          echo "2. Run **Deploy** workflow to switch symlinks + restart services" >> $GITHUB_STEP_SUMMARY
