name: remarka

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: remarka
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - remarka_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d remarka"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/remarka
    depends_on:
      db:
        condition: service_healthy
    command: ["npm", "run", "db:migrate:deploy"]
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    env_file:
      - ./.env.docker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/remarka
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      TIMEWEB_PROXY_SOURCE: remarka-web
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    env_file:
      - ./.env.docker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/remarka
      NODE_ENV: production
      TIMEWEB_PROXY_SOURCE: remarka-worker
      QUEUE_POLL_INTERVAL_SECONDS: "2"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  remarka_postgres_data:
