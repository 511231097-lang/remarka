name: remarka

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: remarka
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - remarka_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d remarka"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    env_file:
      - ./.env.docker
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - remarka_minio_data:/data
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://127.0.0.1:9000/minio/health/live
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    env_file:
      - ./.env.docker
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER:-minioadmin}" "$${MINIO_ROOT_PASSWORD:-minioadmin}"
        mc mb -p "local/$${ARTIFACTS_S3_BUCKET:-remarka-analysis-artifacts}" || true
        mc anonymous set private "local/$${ARTIFACTS_S3_BUCKET:-remarka-analysis-artifacts}" || true
        mc mb -p "local/$${BOOKS_S3_BUCKET:-remarka-books}" || true
        mc anonymous set private "local/$${BOOKS_S3_BUCKET:-remarka-books}" || true
    restart: "no"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/remarka
    depends_on:
      db:
        condition: service_healthy
    command: ["npm", "run", "db:migrate:deploy"]
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    env_file:
      - ./.env.docker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/remarka
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      TIMEWEB_PROXY_SOURCE: remarka-web
      VERTEX_CHAT_MODEL: gemini-3.1-flash-lite-preview
      IMPORT_BLOB_DIR: /var/remarka/imports
      BOOKS_STORAGE_PROVIDER: ${BOOKS_STORAGE_PROVIDER:-s3}
      BOOKS_LOCAL_DIR: /var/remarka/imports/books
      BOOKS_S3_BUCKET: ${BOOKS_S3_BUCKET:-remarka-books}
      BOOKS_S3_REGION: ${BOOKS_S3_REGION:-us-east-1}
      BOOKS_S3_ENDPOINT: ${BOOKS_S3_ENDPOINT:-http://minio:9000}
      BOOKS_S3_KEY_PREFIX: ${BOOKS_S3_KEY_PREFIX:-remarka/books}
      BOOKS_S3_FORCE_PATH_STYLE: ${BOOKS_S3_FORCE_PATH_STYLE:-true}
      BOOKS_S3_ACCESS_KEY_ID: ${BOOKS_S3_ACCESS_KEY_ID:-minioadmin}
      BOOKS_S3_SECRET_ACCESS_KEY: ${BOOKS_S3_SECRET_ACCESS_KEY:-minioadmin}
      BOOKS_S3_SESSION_TOKEN: ${BOOKS_S3_SESSION_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    volumes:
      - remarka_import_blobs:/var/remarka/imports
    restart: unless-stopped

  preprocessor:
    build:
      context: .
      dockerfile: apps/preprocessor/Dockerfile
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8010/health").read()
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    env_file:
      - ./.env.docker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/remarka
      NODE_ENV: production
      TIMEWEB_PROXY_SOURCE: remarka-worker
      VERTEX_CHAT_MODEL: gemini-3.1-flash-lite-preview
      BOOK_QUOTES_ANALYZER_ENABLED: "true"
      BOOK_LITERARY_ANALYZER_ENABLED: "true"
      PREPROCESSOR_URL: http://preprocessor:8010
      OUTBOX_POLL_INTERVAL_MS: "1200"
      IMPORT_BLOB_DIR: /var/remarka/imports
      BOOKS_STORAGE_PROVIDER: ${BOOKS_STORAGE_PROVIDER:-s3}
      BOOKS_LOCAL_DIR: /var/remarka/imports/books
      BOOKS_S3_BUCKET: ${BOOKS_S3_BUCKET:-remarka-books}
      BOOKS_S3_REGION: ${BOOKS_S3_REGION:-us-east-1}
      BOOKS_S3_ENDPOINT: ${BOOKS_S3_ENDPOINT:-http://minio:9000}
      BOOKS_S3_KEY_PREFIX: ${BOOKS_S3_KEY_PREFIX:-remarka/books}
      BOOKS_S3_FORCE_PATH_STYLE: ${BOOKS_S3_FORCE_PATH_STYLE:-true}
      BOOKS_S3_ACCESS_KEY_ID: ${BOOKS_S3_ACCESS_KEY_ID:-minioadmin}
      BOOKS_S3_SECRET_ACCESS_KEY: ${BOOKS_S3_SECRET_ACCESS_KEY:-minioadmin}
      BOOKS_S3_SESSION_TOKEN: ${BOOKS_S3_SESSION_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      preprocessor:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - remarka_import_blobs:/var/remarka/imports
    restart: unless-stopped

volumes:
  remarka_postgres_data:
  remarka_import_blobs:
  remarka_minio_data:
