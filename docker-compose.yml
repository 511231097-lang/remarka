name: remarka

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: remarka
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - remarka_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d remarka"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/remarka
    depends_on:
      db:
        condition: service_healthy
    command: ["npm", "run", "db:migrate:deploy"]
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    env_file:
      - ./.env.docker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/remarka
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      TIMEWEB_PROXY_SOURCE: remarka-web
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    restart: unless-stopped

  preprocessor:
    build:
      context: .
      dockerfile: apps/preprocessor/Dockerfile
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8010/health").read()
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    env_file:
      - ./.env.docker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/remarka
      NODE_ENV: production
      TIMEWEB_PROXY_SOURCE: remarka-worker
      PREPROCESSOR_URL: http://preprocessor:8010
      OUTBOX_POLL_INTERVAL_MS: "1200"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      preprocessor:
        condition: service_healthy
    restart: unless-stopped

volumes:
  remarka_postgres_data:
